---
# Role: observability — handlers

  - name: restart suricata
    ansible.builtin.systemd:
      name: suricata
      state: restarted

  - name: reload systemd
    ansible.builtin.systemd:
      daemon_reload: true

  - name: start pcap-ring
    ansible.builtin.systemd:
      name: levlab-pcap-ring
      state: started
