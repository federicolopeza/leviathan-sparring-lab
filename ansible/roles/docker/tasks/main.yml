---
# Role: docker
# Install Docker CE, configure daemon.json with userns-remap + seccomp + log limits.
# Rootless control-plane for the leviathan user.

- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: false

- name: Create docker config dir
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create docker seccomp dir
  ansible.builtin.file:
    path: /etc/docker/seccomp
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Docker daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: restart docker

- name: Deploy seccomp profile
  ansible.builtin.copy:
    src: seccomp/levlab-default.json
    dest: /etc/docker/seccomp/levlab-default.json
    owner: root
    group: root
    mode: "0644"

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add leviathan to docker group (for rootful docker access if needed)
  ansible.builtin.user:
    name: leviathan
    groups: docker
    append: true

# Rootless setup for leviathan user (control-plane only)
- name: Install rootless docker prerequisites
  ansible.builtin.apt:
    name:
      - uidmap
      - dbus-user-session
    state: present

- name: Setup rootless Docker for leviathan
  ansible.builtin.shell: |
    sudo -iu leviathan bash -c '
      dockerd-rootless-setuptool.sh install --force
      systemctl --user enable docker
      docker context create leviathan-rootless \
        --docker "host=unix:///run/user/$(id -u)/docker.sock" 2>/dev/null || true
    '
  args:
    creates: /home/leviathan/.config/systemd/user/docker.service
  changed_when: false
