[default]
; Intentional: call routing with no restriction — arbitrary PSTN abuse possible
exten => _X.,1,NoOp(Incoming call to ${EXTEN})
exten => _X.,n,Dial(SIP/${EXTEN})
exten => _X.,n,Hangup()

; Intentional: eavesdrop enabled via feature code
exten => *1${EXTEN},1,Eavesdrop(${EXTEN}@default)

; DISA: Direct Inward System Access without PIN (intentional)
exten => 9999,1,DISA(no-password,default)

[internal]
include => default
