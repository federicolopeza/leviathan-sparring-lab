[general]
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
transport=udp,tcp
; Intentional: no TLS
srvlookup=yes
insecure=port,invite
; Intentional: guest access enabled
allowguest=yes

[lab-user1]
type=friend
secret=password123
; Intentional: weak SIP password
host=dynamic
context=default
allow=all

[lab-user2]
type=friend
secret=1234
host=dynamic
context=default
allow=all

[admin-sip]
type=friend
secret=admin
host=dynamic
context=default
allow=all
