    image: vulnerables/web-dvwa:latest
    port: 80
    category: cms
    severity: high
    cve: various
    description: Damn Vulnerable Web App — multi-class
    gonxa_pain: 1

  - name: bwapp
    image: raesene/bwapp:latest
