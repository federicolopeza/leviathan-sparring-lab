# targets/catalog.yml — metadata for 36 GT stacks
#
# Used by scripts/gt-rotate.sh to swap the active GT.
# Only one (or two via override) GT runs at a time.
# Adding new stack: append entry + Dockerfile under targets/<name>/.
#
# Schema:
#   name:          short id matching dir name in targets/
#   image:         docker image (upstream pinned)
#   port:          internal container port
#   network:       target_net (default) or attacker_net
#   category:      cms | api | identity | cicd | data | cloud | k8s | mail | iot | ai | mobile | voip | scada | source
#   severity:      critical | high | medium | low (highest CVE in stack)
#   cve:           main pinned CVE ID (or "various")
#   description:   one-line purpose
#   gonxa_pain:    1-5 difficulty for blackbox pentest (5 = hardest)

targets:

  # ─── CMS ──────────────────────────────────────────────────────────────
  - name: wordpress-cve
    image: wordpress:5.0.0
    port: 80
    category: cms
    severity: critical
    cve: CVE-2019-8942
    description: WordPress 5.0.0 with deserialization RCE
    gonxa_pain: 2

  - name: drupal-cve
    image: drupal:7.57
    port: 80
    category: cms
    severity: critical
    cve: CVE-2018-7600
    description: Drupalgeddon2 unauth RCE
    gonxa_pain: 2

  - name: joomla-cve
    image: joomla:3.7.0
    port: 80
    category: cms
    severity: high
    cve: CVE-2017-8917
    description: Joomla SQLi auth bypass
    gonxa_pain: 2

  # ─── INTENTIONALLY VULN WEB APPS ──────────────────────────────────────
