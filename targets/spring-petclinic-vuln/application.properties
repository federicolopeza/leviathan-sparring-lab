# Spring PetClinic — intentionally misconfigured for lab benchmark
server.port=8080

# Expose ALL actuator endpoints (misconfig: should never be done in prod)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always

# H2 console with no auth (GT: SSRF → H2 console → arbitrary SQL)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Disable security on H2 console path
spring.security.ignored=/h2-console/**

# Weak datasource password (intentional)
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=jdbc:h2:mem:petclinic;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Debug logging
logging.level.org.springframework=DEBUG
