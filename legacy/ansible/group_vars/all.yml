---
# Base domain from env (expanded at runtime via ansible lookup or extra-vars)
base_domain: "{{ lookup('env', 'BASE_DOMAIN') }}"
run_id: "{{ lookup('env', 'RUN_ID') }}"

# WireGuard
wg_server_private_key: "{{ lookup('env', 'WG_SERVER_PRIVATE_KEY') }}"
wg_server_public_key: "{{ lookup('env', 'WG_SERVER_PUBLIC_KEY') }}"
wg_client_public_key: "{{ lookup('env', 'WG_CLIENT_PUBLIC_KEY') }}"
wg_client_address: "{{ lookup('env', 'WG_CLIENT_ADDRESS') | default('10.88.0.2/32') }}"
wg_server_address: "10.88.0.1/24"
wg_listen_port: 51820

# Cloudflared
cf_tunnel_token: "{{ lookup('env', 'CF_TUNNEL_TOKEN') }}"
cf_tunnel_id: "{{ lookup('env', 'CF_TUNNEL_ID') }}"

# Observability
grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
wazuh_api_password: "{{ lookup('env', 'WAZUH_API_PASSWORD') }}"
minio_root_user: "{{ lookup('env', 'MINIO_ROOT_USER') | default('minioadmin') }}"
minio_root_password: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') }}"
vault_dev_root_token: "{{ lookup('env', 'VAULT_DEV_ROOT_TOKEN_ID') }}"

# Paths
levlab_root: /opt/levlab
levlab_artifacts: /opt/levlab/artifacts
levlab_pcap: /pcap/ring

# Docker
docker_userns_remap: "default"
docker_log_max_size: "50m"
docker_log_max_file: "3"
docker_address_pool_base: "172.31.0.0/16"
docker_address_pool_size: 24

# Benchmark identity
engagement_id: leviathan-sparring-lab-24h

# ROE safety limits
max_rps_per_host: 20
max_concurrency: 12
max_runtime_hours: 24
