---
# Role: hardening — handlers

  - name: reload sysctl
    ansible.builtin.command: sysctl --system
    changed_when: false

  - name: restart auditd
    ansible.builtin.systemd:
      name: auditd
      state: restarted

  - name: reload apparmor
    ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/levlab-web /etc/apparmor.d/levlab-db
    changed_when: false

  - name: restart fail2ban
    ansible.builtin.systemd:
      name: fail2ban
      state: restarted

  - name: reload nftables
    ansible.builtin.systemd:
      name: nftables
      state: reloaded
