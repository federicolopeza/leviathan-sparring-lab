---
# Role: hardening
# Packages, users, sysctl, auditd, AIDE, AppArmor, fail2ban, CrowdSec, Falco
# Target: Debian 12 (bookworm). All tasks idempotent.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - wget
      - gnupg
      - jq
      - unzip
      - lsb-release
      - apt-transport-https
      - vim-tiny
      - less
      - tmux
      - htop
      - git
      - rsyslog
      - logrotate
      - chrony
      - vnstat
      - ufw
      - nftables
      - iptables
      - arptables
      - ebtables
      - ipset
      - apparmor
      - apparmor-utils
      - auditd
      - audispd-plugins
      - aide
      - aide-common
      - rkhunter
      - chkrootkit
      - lynis
      - fail2ban
      - wireguard
      - wireguard-tools
      - unattended-upgrades
      - apt-listchanges
      - needrestart
      - python3
      - python3-pip
    state: present

# --- Additional repos ---

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/debian/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable"
    filename: docker
    state: present

- name: Add CrowdSec GPG key
  ansible.builtin.apt_key:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    state: present

- name: Add CrowdSec apt repo
  ansible.builtin.apt_repository:
    repo: "deb https://packagecloud.io/crowdsec/crowdsec/debian/ bookworm main"
    filename: crowdsec
    state: present

- name: Add Falco GPG key
  ansible.builtin.apt_key:
    url: https://falco.org/repo/falcosecurity-packages.asc
    keyring: /etc/apt/keyrings/falco-archive-keyring.gpg
    state: present

- name: Add Falco apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/falco-archive-keyring.gpg] https://download.falco.org/packages/deb stable main"
    filename: falcosecurity
    state: present

- name: Update apt cache after repos
  ansible.builtin.apt:
    update_cache: true

- name: Install CrowdSec + Falco
  ansible.builtin.apt:
    name:
      - crowdsec
      - crowdsec-firewall-bouncer-nftables
      - falco
    state: present

# --- Users ---

- name: Create leviathan user
  ansible.builtin.user:
    name: leviathan
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Lock root password
  ansible.builtin.command: passwd -l root
  changed_when: false

- name: Enable linger for leviathan (rootless systemd)
  ansible.builtin.command: loginctl enable-linger leviathan
  args:
    creates: /var/lib/systemd/linger/leviathan

# --- sysctl ---

- name: Deploy sysctl hardening config
  ansible.builtin.template:
    src: 99-levlab-hardening.conf.j2
    dest: /etc/sysctl.d/99-levlab-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload sysctl

# --- auditd ---

- name: Deploy auditd rules
  ansible.builtin.template:
    src: 99-levlab.rules.j2
    dest: /etc/audit/rules.d/99-levlab.rules
    owner: root
    group: root
    mode: "0640"
  notify: restart auditd

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started

# --- AIDE baseline ---

- name: Check if AIDE database exists
  ansible.builtin.stat:
    path: /var/lib/aide/aide.db
  register: aide_db

- name: Initialize AIDE (first run only)
  ansible.builtin.command: aideinit
  args:
    creates: /var/lib/aide/aide.db.new
  when: not aide_db.stat.exists

- name: Copy AIDE new database to active
  ansible.builtin.copy:
    src: /var/lib/aide/aide.db.new
    dest: /var/lib/aide/aide.db
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when: not aide_db.stat.exists

- name: Deploy AIDE hourly cron
  ansible.builtin.copy:
    content: |
      0 * * * * root /usr/bin/aide --check > /opt/levlab/artifacts/defensive/aide-$(date +\%Y\%m\%d\%H).log 2>&1
    dest: /etc/cron.d/levlab-aide
    owner: root
    group: root
    mode: "0644"

# --- AppArmor ---

- name: Enable AppArmor service
  ansible.builtin.systemd:
    name: apparmor
    enabled: true
    state: started

- name: Deploy AppArmor web profile
  ansible.builtin.copy:
    content: |
      #include <tunables/global>
      profile levlab-web flags=(attach_disconnected,mediate_deleted) {
        #include <abstractions/base>
        deny capability sys_admin,
        deny capability sys_ptrace,
        deny capability dac_override,
        deny /proc/** w,
        deny /sys/** rwklx,
        network inet tcp,
        network inet udp,
      }
    dest: /etc/apparmor.d/levlab-web
    owner: root
    group: root
    mode: "0644"
  notify: reload apparmor

- name: Deploy AppArmor db profile
  ansible.builtin.copy:
    content: |
      #include <tunables/global>
      profile levlab-db flags=(attach_disconnected,mediate_deleted) {
        #include <abstractions/base>
        deny capability sys_admin,
        deny capability sys_module,
        /var/lib/** rwk,
        network inet tcp,
        network inet udp,
      }
    dest: /etc/apparmor.d/levlab-db
    owner: root
    group: root
    mode: "0644"
  notify: reload apparmor

# --- fail2ban ---

- name: Deploy fail2ban jail config
  ansible.builtin.copy:
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 4
      backend = systemd

      [sshd]
      enabled = true
    dest: /etc/fail2ban/jail.d/levlab.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

# --- CrowdSec ---

- name: Install CrowdSec linux collection
  ansible.builtin.command: cscli collections install crowdsecurity/linux
  changed_when: false

- name: Install CrowdSec sshd collection
  ansible.builtin.command: cscli collections install crowdsecurity/sshd
  changed_when: false

- name: Install CrowdSec http-cve collection
  ansible.builtin.command: cscli collections install crowdsecurity/http-cve
  changed_when: false

- name: Enable and start CrowdSec
  ansible.builtin.systemd:
    name: crowdsec
    enabled: true
    state: started

- name: Enable and start CrowdSec firewall bouncer
  ansible.builtin.systemd:
    name: crowdsec-firewall-bouncer
    enabled: true
    state: started

# --- Falco ---

- name: Enable and start Falco
  ansible.builtin.systemd:
    name: falco
    enabled: true
    state: started

# --- nftables ---

- name: Deploy nftables config
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0640"
  notify: reload nftables

- name: Enable and start nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# --- Create levlab dirs ---

- name: Create levlab artifact dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/levlab
    - /opt/levlab/artifacts
    - /opt/levlab/artifacts/defensive
    - /opt/levlab/artifacts/evidence
    - /opt/levlab/artifacts/grafana
    - /pcap/ring

# --- Disable unattended-upgrades during benchmark window ---

- name: Mask unattended-upgrades during benchmark
  ansible.builtin.systemd:
    name: unattended-upgrades
    masked: true

# --- Block metadata endpoint post-cloud-init ---

- name: Wait for cloud-init to complete
  ansible.builtin.wait_for:
    path: /opt/cloud-init-done
    timeout: 120

- name: Block Vultr metadata endpoint via nftables (post cloud-init)
  ansible.builtin.command: nft add rule inet levlab output ip daddr 169.254.169.254 drop
  changed_when: false
  tags: post-cloud-init-metadata-block
