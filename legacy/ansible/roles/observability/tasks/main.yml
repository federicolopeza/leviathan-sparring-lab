---
# Role: observability
# Suricata (host), Arkime + tcpdump ring, Wazuh provisioning refs,
# Loki/Grafana provisioning stubs, Falco (started by hardening role).

# --- Suricata ---

- name: Install Suricata
  ansible.builtin.apt:
    name: suricata
    state: present

- name: Deploy Suricata config
  ansible.builtin.copy:
    content: |
      %YAML 1.1
      ---
      outputs:
        - eve-log:
            enabled: yes
            filetype: regular
            filename: /var/log/suricata/eve.json
            community-id: true
            types:
              - alert
              - http
              - dns
              - tls
              - files
              - flow
              - ssh
              - smtp
              - stats
      rule-files:
        - suricata.rules
      af-packet:
        - interface: eth0
        - interface: any
    dest: /etc/suricata/suricata.yaml
    owner: root
    group: root
    mode: "0644"
  notify: restart suricata

- name: Update Suricata rules
  ansible.builtin.command: suricata-update
  changed_when: false
  args:
    creates: /var/lib/suricata/rules/suricata.rules

- name: Enable and start Suricata
  ansible.builtin.systemd:
    name: suricata
    enabled: true
    state: started

# --- tcpdump ring buffer ---

- name: Create pcap ring directory
  ansible.builtin.file:
    path: /pcap/ring
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy pcap-ring script
  ansible.builtin.copy:
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      mkdir -p /pcap/ring
      exec tcpdump -i any -s 0 -C 256 -W 96 -w /pcap/ring/levlab-%Y%m%d%H%M%S.pcap \
        not host 127.0.0.1
    dest: /usr/local/sbin/pcap-ring.sh
    owner: root
    group: root
    mode: "0750"

- name: Deploy pcap-ring systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Leviathan pcap ring buffer (96x15min = 24h)
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/sbin/pcap-ring.sh
      Restart=on-failure
      RestartSec=5s
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_PACKET AF_UNIX
      CapabilityBoundingSet=CAP_NET_RAW CAP_NET_ADMIN
      AmbientCapabilities=CAP_NET_RAW

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/levlab-pcap-ring.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - start pcap-ring

- name: Enable pcap-ring service
  ansible.builtin.systemd:
    name: levlab-pcap-ring
    enabled: true
    daemon_reload: true

# --- Arkime ---

- name: Download Arkime deb (pinned release)
  ansible.builtin.get_url:
    url: https://github.com/arkime/arkime/releases/download/v5.3.0/arkime_5.3.0-1.debian12_amd64.deb
    dest: /tmp/arkime.deb
    mode: "0644"
  args:
    creates: /opt/arkime/bin/capture

- name: Install Arkime
  ansible.builtin.apt:
    deb: /tmp/arkime.deb
  args:
    creates: /opt/arkime/bin/capture

- name: Deploy Arkime config
  ansible.builtin.copy:
    content: |
      [default]
      elasticsearch=http://localhost:9200
      rotateIndex=daily
      passwordSecret=levlab-arkime-secret
      httpRealm=Arkime
      interface=any
      pcapDir=/pcap/ring
      maxFileSizeG=4
      dbBulkSize=200000
      magicMode=both
      rirFile=/opt/arkime/etc/ipv4-address-space.csv
      ouiFile=/opt/arkime/etc/oui.txt
      rulesFiles=/opt/arkime/etc/rules.conf
    dest: /opt/arkime/etc/config.ini
    owner: root
    group: root
    mode: "0640"

# --- Grafana dashboard provisioning stubs ---
# Operator fills the JSON dashboards; these stubs let Grafana load them at startup.

- name: Create Grafana dashboard provisioning config dir
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    owner: root
    group: grafana
    mode: "0755"
  ignore_errors: true

- name: Create Grafana datasource provisioning config dir
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: root
    group: grafana
    mode: "0755"
  ignore_errors: true

- name: Deploy Grafana dashboard provider config
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      providers:
        - name: levlab
          orgId: 1
          folder: Leviathan
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          options:
            path: /etc/grafana/provisioning/dashboards/levlab
    dest: /etc/grafana/provisioning/dashboards/levlab-provider.yaml
    owner: root
    group: root
    mode: "0644"
  ignore_errors: true

- name: Create dashboard JSON target dir
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards/levlab
    state: directory
    owner: root
    group: root
    mode: "0755"
  ignore_errors: true

- name: Copy Grafana dashboard JSON stubs
  ansible.builtin.copy:
    src: "grafana/dashboards/{{ item }}"
    dest: "/etc/grafana/provisioning/dashboards/levlab/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - payloads-per-stack.json
    - cve-gt-hits.json
    - auth-failures.json
    - privesc-attempts.json
    - lateral-movement.json
    - waf-interaction.json
    - time-to-first-critical.json
    - evidence-chain-health.json
  ignore_errors: true
