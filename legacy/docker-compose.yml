---
# Leviathan Sparring Lab — docker-compose.yml
# 28 target stacks + observability stack + ModSec sidecars + Arkime/tcpdump
# Networks: edge_net, obs_net, cms_net, api_net, id_net, cicd_net,
#           data_net, cloud_net, k8s_net, ot_ai_net, mobile_net, pivot_net
# All targets: hardened with no-new-privileges + seccomp + apparmor + cap_drop

x-zoo-defaults: &zoo-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
    - seccomp:/etc/docker/seccomp/levlab-default.json
    - apparmor:levlab-web
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=128m
  pids_limit: 256
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

x-db-defaults: &db-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
    - seccomp:/etc/docker/seccomp/levlab-default.json
    - apparmor:levlab-db
  cap_drop:
    - ALL
  pids_limit: 512
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

x-modsec-defaults: &modsec-defaults
  image: owasp/modsecurity-crs:nginx
  restart: unless-stopped
  environment:
    - PARANOIA=2
    - ANOMALY_INBOUND=10
    - ANOMALY_OUTBOUND=5
    - MODSEC_AUDIT_LOG=/var/log/modsec_audit.log
    - MODSEC_AUDIT_LOG_TYPE=Serial
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:

  # =====================================================================
  # EDGE — Traefik reverse proxy
  # =====================================================================

  traefik:
    image: traefik:v3.3.4
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:8080"
      - "--entrypoints.websecure.address=:8443"
      - "--ping=true"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--log.level=INFO"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/traefik/dynamic:ro
      - traefik_logs:/var/log/traefik
    networks:
      - edge_net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================================
  # A. CMS / web classic / appsec (7 target stacks)
  # =====================================================================

  # ModSec sidecar for CMS stacks
  modsec-cms:
    <<: *modsec-defaults
    environment:
      - PARANOIA=2
      - BACKEND=http://wordpress-cve:80
    networks:
      - edge_net
      - cms_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cms-modsec.rule=Host(`wp.lab.${BASE_DOMAIN}`) || Host(`drupal.lab.${BASE_DOMAIN}`) || Host(`joomla.lab.${BASE_DOMAIN}`)"

  wordpress-cve:
    <<: *zoo-defaults
    image: lab/wordpress-cve8942:2026.04.23
    environment:
      - WORDPRESS_DB_HOST=mysql-wp
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress123
    depends_on:
      - mysql-wp
    networks:
      - cms_net
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-login.php"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql-wp:
    <<: *db-defaults
    image: mysql:8.0.36
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpress123
      - MYSQL_ROOT_PASSWORD=rootpass123
    volumes:
      - mysql_wp_data:/var/lib/mysql
    networks:
      - cms_net

  drupal-cve:
    <<: *zoo-defaults
    image: lab/drupal-cve7600:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drupal.rule=Host(`drupal.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.drupal.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5

  joomla-cve:
    <<: *zoo-defaults
    image: lab/joomla-cve8562:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.joomla.rule=Host(`joomla.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.joomla.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5

  dvwa:
    <<: *zoo-defaults
    image: ghcr.io/digininja/dvwa:latest
    environment:
      - DB_SERVER=mysql-dvwa
    depends_on:
      - mysql-dvwa
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dvwa.rule=Host(`dvwa.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.dvwa.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login.php"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql-dvwa:
    <<: *db-defaults
    image: mysql:8.0.36
    environment:
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
      - MYSQL_ROOT_PASSWORD=dvwa-root123
    volumes:
      - mysql_dvwa_data:/var/lib/mysql
    networks:
      - cms_net

  webgoat:
    <<: *zoo-defaults
    image: webgoat/webgoat:v2025.3
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webgoat.rule=Host(`webgoat.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.webgoat.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/WebGoat/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  mutillidae:
    <<: *zoo-defaults
    image: lab/mutillidae:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mutillidae.rule=Host(`mutillidae.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.mutillidae.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5

  bwapp:
    <<: *zoo-defaults
    image: lab/bwapp:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bwapp.rule=Host(`bwapp.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.bwapp.loadbalancer.server.port=80"

  juice-shop:
    <<: *zoo-defaults
    image: bkimminich/juice-shop:v17.3.0
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.juice.rule=Host(`juice.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.juice.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/rest/admin/application-configuration"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ModSec sidecar for framework apps
  modsec-frameworks:
    <<: *modsec-defaults
    networks:
      - edge_net
      - cms_net

  django-goat:
    <<: *zoo-defaults
    image: lab/djangogoat:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`django.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.django.loadbalancer.server.port=8000"

  railsgoat:
    <<: *zoo-defaults
    image: lab/railsgoat:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rails.rule=Host(`rails.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.rails.loadbalancer.server.port=3000"

  spring-petclinic-vuln:
    <<: *zoo-defaults
    image: lab/vuln-spring-petclinic:2026.04.23
    networks:
      - cms_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.spring.rule=Host(`spring.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.spring.loadbalancer.server.port=8080"

  # =====================================================================
  # B. APIs / GraphQL / gRPC / Go / .NET (6 stacks)
  # =====================================================================

  modsec-api:
    <<: *modsec-defaults
    networks:
      - edge_net
      - api_net

  vampi:
    <<: *zoo-defaults
    image: lab/vampi:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vampi.rule=Host(`vampi.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.vampi.loadbalancer.server.port=5000"

  dvga:
    <<: *zoo-defaults
    image: lab/dvga:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dvga.rule=Host(`dvga.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.dvga.loadbalancer.server.port=5013"

  crapi:
    <<: *zoo-defaults
    image: lab/crapi:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crapi.rule=Host(`crapi.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.crapi.loadbalancer.server.port=8888"

  grpc-goat:
    <<: *zoo-defaults
    image: lab/grpc-goat:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grpc.rule=Host(`grpc.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.grpc.loadbalancer.server.port=50051"

  dotnet-goat:
    <<: *zoo-defaults
    image: lab/dotnet-goat:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dotnet.rule=Host(`dotnet.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.dotnet.loadbalancer.server.port=5000"

  go-fuzz-svc:
    <<: *zoo-defaults
    image: lab/go-fuzz-svc:2026.04.23
    networks:
      - api_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gofuzz.rule=Host(`gofuzz.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.gofuzz.loadbalancer.server.port=8080"

  # =====================================================================
  # C. Identity / SAML / SaaS (4 stacks)
  # =====================================================================

  modsec-identity:
    <<: *modsec-defaults
    networks:
      - edge_net
      - id_net

  keycloak-weak:
    <<: *zoo-defaults
    image: lab/keycloak-weak:2026.04.23
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
    networks:
      - id_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10

  oauth-lab:
    <<: *zoo-defaults
    image: lab/oauth-lab:2026.04.23
    networks:
      - id_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth.rule=Host(`oauth.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.oauth.loadbalancer.server.port=8080"

  saml-target:
    <<: *zoo-defaults
    image: lab/saml-target:2026.04.23
    networks:
      - id_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saml.rule=Host(`saml.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.saml.loadbalancer.server.port=8080"

  tenant-billing-api:
    <<: *zoo-defaults
    image: lab/tenant-billing-api:2026.04.23
    networks:
      - id_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tenant-billing.rule=Host(`tenant-billing.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.tenant-billing.loadbalancer.server.port=3000"

  # =====================================================================
  # D. CI/CD / supply chain (5 stacks)
  # =====================================================================

  modsec-cicd:
    <<: *modsec-defaults
    networks:
      - edge_net
      - cicd_net

  jenkins-old:
    <<: *zoo-defaults
    image: lab/jenkins-cve1000861:2026.04.23
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - cicd_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jenkins.rule=Host(`jenkins.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.jenkins.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 10

  gitlab-ce-old:
    <<: *zoo-defaults
    image: lab/gitlab-ce-cve22205:2026.04.23
    hostname: gitlab.lab.${BASE_DOMAIN}
    volumes:
      - gitlab_data:/var/opt/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_config:/etc/gitlab
    networks:
      - cicd_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitlab.rule=Host(`gitlab.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.gitlab.loadbalancer.server.port=8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/-/health"]
      interval: 60s
      timeout: 30s
      retries: 10

  nexus-old:
    <<: *zoo-defaults
    image: lab/nexus-cve10199:2026.04.23
    volumes:
      - nexus_data:/nexus-data
    networks:
      - cicd_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus.rule=Host(`nexus.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.nexus.loadbalancer.server.port=8081"

  sonarqube-old:
    <<: *zoo-defaults
    image: lab/sonar-cve27986:2026.04.23
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - cicd_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonar.rule=Host(`sonar.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.sonar.loadbalancer.server.port=9000"

  gitea-secrets:
    <<: *zoo-defaults
    image: gitea/gitea:1.21.11
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3001
    volumes:
      - gitea_data:/data
    networks:
      - cicd_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.gitea.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/version"]
      interval: 30s
      timeout: 10s
      retries: 10

  # =====================================================================
  # E. Data stores exposed (4 stacks)
  # =====================================================================

  mongo-open:
    <<: *db-defaults
    image: mongo:6.0.14
    # No auth by default — intentional misconfig
    volumes:
      - mongo_data:/data/db
    networks:
      - data_net
      - pivot_net

  redis-open:
    <<: *db-defaults
    image: redis:7.2.4
    # No --requirepass — intentional misconfig
    volumes:
      - redis_data:/data
    networks:
      - data_net
      - pivot_net

  elastic-open:
    <<: *db-defaults
    image: elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - data_net
      - pivot_net

  postgres-open:
    <<: *db-defaults
    image: postgres:16.2
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=labdb
      - POSTGRES_USER=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net
      - pivot_net
      - edge_net

  # =====================================================================
  # F. Cloud sim (4 stacks)
  # =====================================================================

  localstack:
    <<: *zoo-defaults
    image: localstack/localstack:3.5.0
    environment:
      - SERVICES=s3,iam,lambda,sts,ec2,ssm
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cloud_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aws.rule=Host(`aws.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.aws.loadbalancer.server.port=4566"

  minio-open:
    <<: *db-defaults
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - cloud_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  vault-dev-bad:
    <<: *zoo-defaults
    image: hashicorp/vault:1.16.3
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - cloud_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  metadata-sim:
    <<: *zoo-defaults
    image: lab/imds-sim:2026.04.23
    networks:
      - cloud_net

  # =====================================================================
  # G. AD / K8s (2 stacks)
  # =====================================================================

  ad-budget:
    <<: *db-defaults
    image: lab/samba-ad-weak:2026.04.23
    networks:
      - pivot_net
      - edge_net
    labels:
      - "traefik.enable=false"

  # k3s runs on the host, kube-goat deployed via k3s manifest — not in compose
  # placeholder service for network membership
  kube-goat-proxy:
    <<: *zoo-defaults
    image: lab/kube-goat:2026.04.23
    networks:
      - k8s_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.k8s.rule=Host(`k8s.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.k8s.loadbalancer.server.port=8080"

  # =====================================================================
  # H. Mail (3 stacks)
  # =====================================================================

  mail-weak:
    <<: *zoo-defaults
    image: lab/postfix-dovecot-weak:2026.04.23
    networks:
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mail.rule=Host(`mail.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.mail.loadbalancer.server.port=80"

  mailhog:
    <<: *zoo-defaults
    image: mailhog/mailhog:v1.0.1
    networks:
      - edge_net
    labels:
      - "traefik.enable=false"

  exchange-mock:
    <<: *zoo-defaults
    image: lab/exchange-mock:2026.04.23
    networks:
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.exchange.rule=Host(`exchange.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.exchange.loadbalancer.server.port=8080"

  # =====================================================================
  # I. IoT / AI / mobile / wireless / VoIP / SCADA (7 stacks)
  # =====================================================================

  iotgoat:
    <<: *zoo-defaults
    image: lab/iotgoat-qemu:2026.04.23
    networks:
      - ot_ai_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iot.rule=Host(`iot.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.iot.loadbalancer.server.port=80"

  promptme:
    <<: *zoo-defaults
    image: lab/promptme:2026.04.23
    networks:
      - ot_ai_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8080"

  dvaia:
    <<: *zoo-defaults
    image: lab/damn-vulnerable-ai-agent:2026.04.23
    networks:
      - ot_ai_net
      - edge_net
    labels:
      - "traefik.enable=false"

  mobile-backend:
    <<: *zoo-defaults
    image: lab/mobile-backend-weak:2026.04.23
    networks:
      - mobile_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mobile.rule=Host(`mobile.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.mobile.loadbalancer.server.port=3000"

  wireless-sim:
    <<: *zoo-defaults
    image: lab/wireless-sim:2026.04.23
    networks:
      - mobile_net

  asterisk-weak:
    <<: *zoo-defaults
    image: lab/asterisk-weak:2026.04.23
    networks:
      - ot_ai_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voip.rule=Host(`voip.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.voip.loadbalancer.server.port=8080"

  openplc-hmi:
    <<: *zoo-defaults
    image: lab/openplc-hmi:2026.04.23
    networks:
      - ot_ai_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scada.rule=Host(`scada.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.scada.loadbalancer.server.port=8080"

  # =====================================================================
  # OBSERVABILITY STACK
  # =====================================================================

  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    restart: unless-stopped
    environment:
      - WAZUH_API_USERNAME=wazuh
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD}
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - wazuh_manager_logs:/var/ossec/logs
    networks:
      - obs_net
    ports:
      - "127.0.0.1:55000:55000"
      - "127.0.0.1:1514:1514/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:55000/", "-k"]
      interval: 30s
      timeout: 10s
      retries: 10

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.2
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    networks:
      - obs_net

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    restart: unless-stopped
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=wazuh
      - API_PASSWORD=${WAZUH_API_PASSWORD}
    networks:
      - obs_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wazuh.rule=Host(`wazuh.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.wazuh.loadbalancer.server.port=443"

  loki:
    image: grafana/loki:3.1.2
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - obs_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  promtail:
    image: grafana/promtail:3.1.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - traefik_logs:/var/log/traefik:ro
    networks:
      - obs_net

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - obs_net

  grafana:
    image: grafana/grafana:11.2.3
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.lab.${BASE_DOMAIN}
    volumes:
      - grafana_data:/var/lib/grafana
      - /etc/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - obs_net
      - edge_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.lab.${BASE_DOMAIN}`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - loki
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - obs_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - obs_net

  # Arkime (network traffic metadata)
  arkime:
    image: arkime/arkime:v5.3.0
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/arkime/etc/config.ini:/opt/arkime/etc/config.ini:ro
      - /pcap/ring:/pcap/ring:ro
      - arkime_data:/opt/arkime/db
    depends_on:
      - elastic-open

  # Suricata runs on host via systemd (installed by observability role)
  # Falco runs on host via systemd (installed by hardening role)

  # =====================================================================
  # VOLUMES
  # =====================================================================

volumes:
  # CMS
  mysql_wp_data:
  mysql_dvwa_data:
  # CI/CD
  jenkins_home:
  gitlab_data:
  gitlab_logs:
  gitlab_config:
  nexus_data:
  sonar_data:
  sonar_logs:
  gitea_data:
  # Data stores
  mongo_data:
  redis_data:
  elastic_data:
  postgres_data:
  # Cloud sim
  localstack_data:
  minio_data:
  vault_data:
  # Observability
  wazuh_manager_data:
  wazuh_manager_logs:
  wazuh_indexer_data:
  loki_data:
  prometheus_data:
  grafana_data:
  traefik_logs:
