<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melispy</title>
<meta name="description" content="Infrastructure for SaaS teams.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://melispy.com/">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg-2: #11121a; --fg: #f5f5f7; --muted: #8a8a99;
    --accent: #7c5cff; --accent-2: #00d4aa; --border: #1f2030;
  }
  body { background: var(--bg); color: var(--fg); font-family: -apple-system, "Inter", "SF Pro Display", system-ui, sans-serif; line-height: 1.5; }
  header { padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .logo { font-weight: 700; letter-spacing: -0.02em; font-size: 20px; }
  .logo span { color: var(--accent); }
  nav a { color: var(--muted); text-decoration: none; margin-left: 32px; font-size: 14px; }
  nav a:hover { color: var(--fg); }
  .hero { padding: 120px 48px 80px; max-width: 1100px; margin: 0 auto; }
  .badge { display: inline-block; padding: 6px 12px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; color: var(--muted); margin-bottom: 24px; }
  h1 { font-size: clamp(40px, 6vw, 72px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; max-width: 800px; }
  h1 em { font-style: normal; background: linear-gradient(120deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lede { font-size: 20px; color: var(--muted); margin-top: 24px; max-width: 620px; }
  .cta { margin-top: 40px; display: flex; gap: 12px; }
  .btn { padding: 14px 24px; border-radius: 8px; font-size: 15px; font-weight: 500; text-decoration: none; }
  .btn-primary { background: var(--fg); color: var(--bg); }
  .btn-ghost { border: 1px solid var(--border); color: var(--fg); }
  footer { padding: 40px 48px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
  footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
<header>
  <div class="logo">melispy<span>.</span></div>
  <nav>
    <a href="/pricing">Pricing</a>
    <a href="/login">Sign in</a>
  </nav>
</header>

<div class="hero">
  <h1>Infrastructure for <em>modern teams</em>.</h1>
  <p class="lede">Sign in to access your workspace.</p>
  <div class="cta">
    <a class="btn btn-primary" href="/login">Sign in</a>
    <a class="btn btn-ghost" href="/pricing">Pricing</a>
  </div>
</div>

<footer>
  <p>© 2026 Melispy Inc.</p>
</footer>
</body>
</html>
