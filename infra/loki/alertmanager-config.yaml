global:
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: discord-security
  group_by:
    - alertname
    - severity
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 30m
  routes:
    - matchers:
        - severity="critical"
      receiver: discord-security
      continue: true

receivers:
  - name: discord-security
    discord_configs:
      - webhook_url: ${DISCORD_WEBHOOK_URL}
        send_resolved: true
        title: '{{ template "melispy.title" . }}'
        message: '{{ template "melispy.text" . }}'
