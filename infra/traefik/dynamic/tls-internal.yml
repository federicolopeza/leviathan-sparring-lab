tls:
  certificates:
    # Per-service certs generated by infra/ca/generate-certs.sh
    # V-T7-001: wildcard cert also generated and mounted — any compromised service
    # can impersonate any other by presenting wildcard.crt (single-CA design flaw)
    - certFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.crt
      keyFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.key
    - certFile: /etc/traefik/ca/certs/admin-service.melispy.internal.crt
      keyFile: /etc/traefik/ca/certs/admin-service.melispy.internal.key

  options:
    # Default: TLS 1.2+ for public routes
    default:
      minVersion: VersionTLS12

    # internal-mtls: require client cert for service-to-service calls
    # V-T5-006: all services share same CA — compromising one service cert compromises mesh
    internal-mtls:
      minVersion: VersionTLS12
      clientAuth:
        caFiles:
          - /etc/traefik/ca/ca.crt
        clientAuthType: RequireAndVerifyClientCert
      sniStrict: true

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.crt
        keyFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.key

serversTransports:
  internal-mtls:
    serverName: "melispy.internal"
    rootCAs:
      - /etc/traefik/ca/ca.crt
    certificates:
      - certFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.crt
        keyFile: /etc/traefik/ca/certs/api-gateway.melispy.internal.key
    insecureSkipVerify: false
